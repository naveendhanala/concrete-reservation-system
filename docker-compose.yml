version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: concrete_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: concrete_reservation
      POSTGRES_USER: concrete_user
      POSTGRES_PASSWORD: concrete_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U concrete_user -d concrete_reservation']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: concrete_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: concrete_reservation
      DB_USER: concrete_user
      DB_PASSWORD: concrete_pass
      JWT_SECRET: supersecretjwtkey_changeinproduction
      JWT_REFRESH_SECRET: superrefreshsecret_changeinproduction
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: noreply@concrete.com
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: concrete_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
